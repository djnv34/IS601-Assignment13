# docker-compose.yml

# ---------------------------------------------
# Docker Compose Configuration File
# ---------------------------------------------

# This Docker Compose file defines and configures the services required to run
# the FastAPI Calculator application along with PostgreSQL and pgAdmin.
# Docker Compose is a tool that allows you to define and manage multi-container
# Docker applications using a YAML file.

# Version Specification
version: '3.8'  # Specify the version of Docker Compose syntax to use.

# Services Definition
services:
  # Service: web
  web:
    # Build Configuration
    build: .  # Instructs Docker Compose to build the Docker image using the Dockerfile located in the current directory (denoted by '.').
    
    # Container Naming
    container_name: fastapi_calculator3  # Assigns a custom name "fastapi_calculator" to the container. This makes it easier to reference the container in Docker commands.
    
    # Port Mapping
    ports:
      - "8000:8000"  # Maps port 8000 on the host machine to port 8000 in the Docker container. This allows access to the FastAPI application via localhost:8000 on the host.
    
    # Volume Mounting
    volumes:
      - .:/app  # Mounts the current directory (host) to the `/app` directory inside the container. This facilitates live updates by reflecting changes made in the host directory within the container without rebuilding the image.
    
    # Environment Variables
    environment:
      - PYTHONDONTWRITEBYTECODE=1  # Prevents Python from writing `.pyc` files to disk. This ensures that only source code is maintained, keeping the container clean.
      - PYTHONUNBUFFERED=1  # Forces Python to flush the output buffer immediately. This is useful for real-time logging, ensuring that logs are visible as they are generated.
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db  # Defines the database connection string for the FastAPI application. The hostname `db` matches the PostgreSQL service name below.
    
    # Service Dependencies
    depends_on:
      - db  # Ensures that the PostgreSQL database container starts before the FastAPI application container.
    
    # Command Execution
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      # Specifies the command to run when the container starts.
      # - `uvicorn`: An ASGI server for running FastAPI applications.
      # - `main:app`: Points to the `app` instance in the `main.py` file, which is the FastAPI application.
      # - `--host 0.0.0.0`: Binds the server to all network interfaces, making it accessible externally.
      # - `--port 8000`: Sets the port on which the server will listen inside the container.
      # - `--reload`: Enables automatic reloading of the server when code changes are detected. This is particularly useful during development for immediate feedback without manual restarts.

  # Service: db
  db:
    # Image Selection
    image: postgres:15  # Uses the official PostgreSQL version 15 image from Docker Hub.
    
    # Container Naming
    container_name: postgres_db  # Assigns a custom name "postgres_db" to the PostgreSQL container.
    
    # Restart Policy
    restart: always  # Automatically restarts the container if it stops unexpectedly.
    
    # Port Mapping
    ports:
      - "5432:5432"  # Maps port 5432 on the host machine to port 5432 in the container, which is PostgreSQL's default port.
    
    # Environment Variables
    environment:
      - POSTGRES_USER=postgres  # Sets the default PostgreSQL username.
      - POSTGRES_PASSWORD=postgres  # Sets the default PostgreSQL password.
      - POSTGRES_DB=fastapi_db  # Creates a default database named `fastapi_db` when the container starts.
    
    # Volume Mounting
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Stores PostgreSQL data in a named Docker volume so the database persists even if the container is removed.

  # Service: pgadmin
  pgadmin:
    # Image Selection
    image: dpage/pgadmin4  # Uses the official pgAdmin 4 image from Docker Hub.
    
    # Container Naming
    container_name: pgadmin  # Assigns a custom name "pgadmin" to the pgAdmin container.
    
    # Restart Policy
    restart: always  # Automatically restarts the container if it stops unexpectedly.
    
    # Port Mapping
    ports:
      - "5050:80"  # Maps port 5050 on the host machine to port 80 in the container. This allows access to pgAdmin via localhost:5050.
    
    # Environment Variables
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com  # Sets the default login email for pgAdmin.
      - PGADMIN_DEFAULT_PASSWORD=admin  # Sets the default login password for pgAdmin.
    
    # Service Dependencies
    depends_on:
      - db  # Ensures that the PostgreSQL container starts before pgAdmin.

# Named Volumes Definition
volumes:
  postgres_data:
    # Defines a named volume called `postgres_data`.
    # Named volumes are managed by Docker and are commonly used for database persistence.

# ---------------------------------------------
# Detailed Explanation of Each Component
# ---------------------------------------------

# 1. Version Specification (`version: '3.8'`)
#    - Defines the version of the Docker Compose file format to use.
#    - It's essential to specify the version to ensure compatibility and access to the latest features.
#    - Version '3.8' is widely supported and includes modern Docker Compose functionalities.

# 2. Services (`services:`)
#    - The `services` section lists all the containers (services) that make up your application.
#    - Each service can be thought of as a separate component of your application, such as a web server, database, or administrative tool.

# 3. Service: `web`
#    - Represents the FastAPI Calculator application.
#    - Encapsulates all configurations needed to build and run the application inside a Docker container.

#    a. Build Configuration (`build: .`)
#       - Tells Docker Compose to build the Docker image using the Dockerfile located in the current directory (`.`).
#       - This process involves reading the instructions in the Dockerfile to set up the application's environment.

#    b. Container Naming (`container_name: fastapi_calculator`)
#       - Assigns a specific name to the container instead of a randomly generated one.
#       - Benefits:
#         - Easier to reference in Docker commands.
#         - Enhances readability and organization, especially when managing multiple containers.

#    c. Port Mapping (`ports:`)
#       - Defines how ports on the host machine are forwarded to ports inside the container.
#       - Format: `"host_port:container_port"`
#       - Example: `"8000:8000"` maps port 8000 on the host to port 8000 in the container.
#       - Importance:
#         - Allows external access to services running inside containers.
#         - Essential for web applications that need to be accessible via a browser.

#    d. Volume Mounting (`volumes:`)
#       - Links directories between the host and the container.
#       - Format: `"host_directory:container_directory"`
#       - Example: `".:/app"` mounts the current host directory to `/app` inside the container.
#       - Benefits:
#         - Enables live code updates without rebuilding the Docker image.
#         - Facilitates data persistence and sharing between the host and container.

#    e. Environment Variables (`environment:`)
#       - Sets environment variables inside the container.
#       - Format: `- VARIABLE_NAME=value`
#       - Example:
#         - `PYTHONDONTWRITEBYTECODE=1`: Prevents Python from generating `.pyc` files.
#         - `PYTHONUNBUFFERED=1`: Ensures that Python outputs logs and errors in real-time.
#         - `DATABASE_URL=...`: Provides the FastAPI application with the connection string for the PostgreSQL database.

#    f. Service Dependencies (`depends_on:`)
#       - Ensures the web service starts after the database service.
#       - This is helpful when one container relies on another to function properly.

#    g. Command Execution (`command: ...`)
#       - Overrides the default command specified in the Dockerfile.
#       - In this case, it runs the FastAPI application using Uvicorn with specific parameters.

# 4. Service: `db`
#    - Represents the PostgreSQL database used by the application.
#    - Stores structured data such as users and calculation records.

#    a. Image Selection (`image: postgres:15`)
#       - Uses the official PostgreSQL image.
#       - Provides a ready-to-use relational database server inside a container.

#    b. Container Naming (`container_name: postgres_db`)
#       - Assigns a clear and descriptive name to the database container.

#    c. Port Mapping (`ports:`)
#       - Exposes PostgreSQL on port 5432 so that tools like pgAdmin can connect to it.

#    d. Environment Variables (`POSTGRES_USER`, `POSTGRES_PASSWORD`, `POSTGRES_DB`)
#       - Configure the initial PostgreSQL user, password, and database name.

#    e. Volume Mounting (`postgres_data:/var/lib/postgresql/data`)
#       - Persists database data using a Docker-managed named volume.
#       - Prevents data loss when containers are stopped or recreated.

# 5. Service: `pgadmin`
#    - Represents pgAdmin, a web-based administrative interface for PostgreSQL.
#    - Allows users to visually manage the database and run SQL commands.

#    a. Image Selection (`image: dpage/pgadmin4`)
#       - Uses the official pgAdmin image.

#    b. Port Mapping (`ports:`)
#       - Maps host port 5050 to container port 80.
#       - This allows access to pgAdmin through `http://localhost:5050`.

#    c. Environment Variables (`PGADMIN_DEFAULT_EMAIL`, `PGADMIN_DEFAULT_PASSWORD`)
#       - Set the login credentials for accessing pgAdmin.

#    d. Service Dependencies (`depends_on:`)
#       - Ensures pgAdmin starts after PostgreSQL is available.

# 6. Named Volumes (`volumes:`)
#    - Defines persistent storage for the PostgreSQL database.
#    - Named volumes are useful for preserving important data independently of container lifecycles.

